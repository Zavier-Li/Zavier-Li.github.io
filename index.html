<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Zavier Li - research in optimization geometry, machine learning, and causal optimizer analysis.">
  <meta name="theme-color" content="#f5f7fb">
  <title>Zavier Li | Research</title>
  <link rel="stylesheet" href="/assets/site.css">
</head>
<body data-page="home">
  <div class="site-shell">
    <header class="site-header" data-header></header>
    <main>
      <section class="hero" aria-labelledby="hero-title">
        <div class="hero-copy reveal">
          <p class="eyebrow" data-i18n="hero.kicker"></p>
          <h1 id="hero-title" data-i18n="hero.title"></h1>
          <p class="lede" data-i18n="hero.copy"></p>
          <div class="hero-actions">
            <a class="button button-primary" href="#papers" data-i18n="hero.read"></a>
            <a class="button button-text" href="https://github.com/Zavier-Li" target="_blank" rel="noreferrer" data-i18n="hero.github"></a>
          </div>
        </div>
        <div class="geometry-stage reveal" aria-label="Geometric study">
          <div class="geometry-grid"></div>
          <div class="geometry-orbit orbit-a"></div><div class="geometry-orbit orbit-b"></div>
          <div class="geometry-point point-a"></div><div class="geometry-point point-b"></div><div class="geometry-point point-c"></div>
          <p class="geometry-label">SPD / AIRM / OPT</p>
        </div>
      </section>

      <section class="statement section-rule reveal" id="about">
        <p class="section-index">01</p>
        <div><h2 data-i18n="about.title"></h2><p data-i18n="about.copy"></p></div>
      </section>

      <section class="papers-section" id="papers">
        <div class="section-heading reveal"><p class="section-index">02</p><div><h2 data-i18n="papers.title"></h2><p data-i18n="papers.copy"></p></div></div>
        <div class="paper-list" data-paper-list></div>
      </section>

      <section class="projects-section section-rule" id="projects">
        <div class="section-heading reveal"><p class="section-index">03</p><div><h2 data-i18n="projects.title"></h2><p data-i18n="projects.copy"></p></div></div>
        <div class="project-list" data-project-list></div>
      </section>
    </main>
    <footer class="site-footer" data-footer></footer>
  </div>
  <script src="/assets/site.js"></script>
</body>
</html>
